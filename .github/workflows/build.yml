name: "🧊 Trivo — Build & Release"

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  QT_VERSION: "6.7.3"
  BUILD_TYPE:  "Release"

# =============================================================================
jobs:

# ─────────────────────────────────────────────────────────────────────────────
# 🪟  WINDOWS  (MSVC 2022, x64)
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: "🪟 Windows x64"
    runs-on: windows-2022

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # ── Qt6 설치 (공식 바이너리) ─────────────────────────────────────────
      - name: "⚙️ Install Qt ${{ env.QT_VERSION }}"
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION }}
          host:     windows
          target:   desktop
          arch:     win64_msvc2019_64
          cache:    true

      # ── vcpkg 캐시 ────────────────────────────────────────────────────────
      # vcpkg.json 을 워크스페이스 밖에 두어 매니페스트 모드 방지
      - name: "💾 Cache vcpkg"
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg_standalone
          key: vcpkg-win-assimp-${{ runner.os }}-v5
          restore-keys: vcpkg-win-assimp-

      # ── vcpkg 설치 (클래식 모드 — vcpkg.json 없는 별도 디렉토리 사용) ──
      - name: "📦 Install Assimp via vcpkg (classic mode)"
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # 프로젝트 루트와 분리된 디렉토리에 vcpkg 설치
          # → vcpkg.json 이 없으므로 클래식 모드로 동작
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg_standalone --depth=1
          C:\vcpkg_standalone\bootstrap-vcpkg.bat -disableMetrics

          # 클래식 모드: 패키지명 직접 지정 가능
          C:\vcpkg_standalone\vcpkg.exe install assimp:x64-windows --classic `
          --vcpkg-root=C:\vcpkg_standalone `
          --no-print-usage

      - name: "🔗 Set vcpkg env"
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=C:\vcpkg_standalone" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN=C:\vcpkg_standalone\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      # ── CMake 구성 ────────────────────────────────────────────────────────
      - name: "🔧 Configure CMake"
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg_standalone\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="x64-windows" `
            -DVCPKG_MANIFEST_MODE=OFF

      # ── 빌드 ──────────────────────────────────────────────────────────────
      - name: "🔨 Build"
        shell: pwsh
        run: |
          cmake --build build `
            --config ${{ env.BUILD_TYPE }} `
            --parallel $env:NUMBER_OF_PROCESSORS

      # ── 배포 패키징 ───────────────────────────────────────────────────────
      - name: "📁 Deploy (windeployqt & All DLLs)"
        shell: pwsh
        run: |
          $dest = "dist\Trivo"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          # 1. 빌드된 exe 복사
          $exe = Get-ChildItem -Recurse build -Filter Trivo.exe |
                   Where-Object { $_.FullName -match "Release" } |
                   Select-Object -First 1
          Copy-Item $exe.FullName "$dest\Trivo.exe"

          # 2. Qt 관련 파일 배포
          $qtBin = "$env:QT_ROOT_DIR\bin"
          & "$qtBin\windeployqt.exe" "$dest\Trivo.exe" --no-translations --release

          # 3. vcpkg의 모든 DLL을 한 번에 설치 (이 부분이 핵심!)
          $vcpkgBin = "C:\vcpkg_standalone\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem "$vcpkgBin\*.dll" | Copy-Item -Destination $dest -Force
          }

          Write-Host "배포 폴더 내용:"
          Get-ChildItem $dest | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: "📦 Package ZIP"
        shell: pwsh
        run: |
          Compress-Archive -Path dist\Trivo -DestinationPath Trivo-Windows-x64.zip
          $size = (Get-Item Trivo-Windows-x64.zip).Length / 1MB
          Write-Host "ZIP size: $([math]::Round($size,1)) MB"

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Windows-x64
          path: Trivo-Windows-x64.zip
          if-no-files-found: error


# ─────────────────────────────────────────────────────────────────────────────
# 🍎  macOS  (Universal Binary: arm64 + x86_64)
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: "🍎 macOS Universal"
    runs-on: macos-14

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "💾 Cache Homebrew Assimp"
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/assimp
            /opt/homebrew/opt/assimp
          key: brew-assimp-macos14-v2
          restore-keys: brew-assimp-macos14-

      - name: "📦 Install Assimp (Homebrew)"
        run: |
          brew install assimp || brew upgrade assimp || true
          echo "ASSIMP_DIR=$(brew --prefix assimp)" >> $GITHUB_ENV

      - name: "⚙️ Install Qt ${{ env.QT_VERSION }}"
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION }}
          host:     mac
          target:   desktop
          arch:     clang_64
          cache:    true

      - name: "🔧 Configure CMake"
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DCMAKE_PREFIX_PATH="${{ env.ASSIMP_DIR }}"

      - name: "🔨 Build"
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.logicalcpu)

      - name: "📁 Deploy → DMG"
        run: |
          APP=$(find build -name "Trivo.app" -maxdepth 5 | head -1)
          echo "App bundle: $APP"

          QT_BIN="${Qt6_DIR}/../../../bin"
          "${QT_BIN}/macdeployqt" "${APP}" -dmg -no-strip -always-overwrite

          DMG=$(find build -name "*.dmg" | head -1)
          mv "$DMG" Trivo-macOS-Universal.dmg
          echo "DMG: $(du -sh Trivo-macOS-Universal.dmg)"

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-macOS
          path: Trivo-macOS-Universal.dmg
          if-no-files-found: error


# ─────────────────────────────────────────────────────────────────────────────
# 🐧  LINUX  (Ubuntu 22.04, x86_64, AppImage)
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: "🐧 Linux x86_64 (AppImage)"
    runs-on: ubuntu-22.04

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Install system dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libassimp-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb-cursor-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-xinerama0-dev \
            libxcb-xinput-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libfreetype6-dev \
            libdbus-1-dev libharfbuzz-dev libssl-dev \
            fuse libfuse2 patchelf wget file

      - name: "⚙️ Install Qt ${{ env.QT_VERSION }}"
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION }}
          host:     linux
          target:   desktop
          arch:     gcc_64
          cache:    true

      - name: "🔧 Configure CMake"
        run: |
          cmake -B build -S . \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: "🔨 Build"
        run: cmake --build build --parallel $(nproc)

      - name: "📁 Install into AppDir"
        run: |
          DESTDIR="${GITHUB_WORKSPACE}/AppDir" cmake --install build

          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p AppDir/usr/share/applications

          cp resources/icons/trivo_app.svg \
             AppDir/usr/share/icons/hicolor/scalable/apps/trivo.svg
          cp resources/trivo.desktop \
             AppDir/usr/share/applications/trivo.desktop

      - name: "💾 Cache linuxdeploy"
        uses: actions/cache@v4
        with:
          path: |
            linuxdeploy-x86_64.AppImage
            linuxdeploy-plugin-qt-x86_64.AppImage
          key: linuxdeploy-v3

      - name: "⬇️ Download linuxdeploy"
        run: |
          BASE="https://github.com/linuxdeploy"
          [ -f linuxdeploy-x86_64.AppImage ] || \
            wget -q "${BASE}/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          [ -f linuxdeploy-plugin-qt-x86_64.AppImage ] || \
            wget -q "${BASE}/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: "📦 Build AppImage"
        env:
          QMAKE:                  "${{ env.Qt6_DIR }}/../../../bin/qmake"
          OUTPUT:                 "Trivo-Linux-x86_64.AppImage"
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/trivo.desktop \
            --icon-file resources/icons/trivo_app.svg

          find . -maxdepth 1 -name "Trivo*.AppImage" -exec mv {} Trivo-Linux-x86_64.AppImage \;
          echo "AppImage: $(du -sh Trivo-Linux-x86_64.AppImage)"

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Linux-x86_64
          path: Trivo-Linux-x86_64.AppImage
          if-no-files-found: error


# ─────────────────────────────────────────────────────────────────────────────
# 🚀  RELEASE  (태그 push 시에만)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: "🚀 GitHub Release"
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: "📥 Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: "📋 List files"
        run: find dist/ -type f -ls

      - name: "🚀 Publish Release"
        uses: softprops/action-gh-release@v2
        with:
          name: "🧊 Trivo ${{ github.ref_name }}"
          body: |
            ## 🧊 Trivo ${{ github.ref_name }}

            **오픈소스 3D 파일 뷰어 / Open-source 3D File Viewer**

            ### 📥 다운로드 / Downloads

            | 플랫폼 / Platform | 파일 / File |
            |---|---|
            | 🪟 Windows 10/11 x64 | `Trivo-Windows-x64.zip` |
            | 🍎 macOS 11+ (Universal) | `Trivo-macOS-Universal.dmg` |
            | 🐧 Linux x86_64 | `Trivo-Linux-x86_64.AppImage` |

            > Linux: `chmod +x Trivo-Linux-x86_64.AppImage && ./Trivo-Linux-x86_64.AppImage`

            ### ✨ 기능 / Features
            GLB · GLTF · FBX · OBJ · DAE · STL · PLY · 3DS · BLEND · BVH · STEP · IGES · IFC · DXF · 30+  
            PBR 렌더링 · 다중 모델 씬 · 애니메이션 재생 · 5가지 라이트 · 다크/라이트 테마 · 한국어/영어

            ### 📚 라이브러리 / Libraries
            Qt 6 (LGPL v3) · Assimp 5.x (BSD 3-Clause) · OpenGL 4.1

          files: |
            dist/**/*.zip
            dist/**/*.dmg
            dist/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
