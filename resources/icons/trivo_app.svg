<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1a30"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5aa0ff"/>
      <stop offset="100%" style="stop-color:#2060d0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#40d0c0"/>
      <stop offset="100%" style="stop-color:#2090a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="62" fill="none" stroke="#3a7bd5" stroke-width="2" opacity="0.5"/>

  <!-- 3D cube wireframe - isometric -->
  <!-- Bottom face -->
  <polygon points="64,80 90,66 64,52 38,66" fill="#1e3a5f" stroke="#3a7bd5" stroke-width="1.5"/>
  <!-- Right face -->
  <polygon points="64,80 90,66 90,44 64,58" fill="#162e50" stroke="#3a7bd5" stroke-width="1.5"/>
  <!-- Left face -->
  <polygon points="64,80 38,66 38,44 64,58" fill="#1a3558" stroke="#5aa0ff" stroke-width="1.5"/>
  <!-- Top face -->
  <polygon points="64,58 90,44 64,30 38,44" fill="url(#blue)" stroke="#5aa0ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Edge highlights -->
  <line x1="64" y1="30" x2="64" y2="58" stroke="#80c0ff" stroke-width="2" opacity="0.8"/>
  <line x1="64" y1="80" x2="64" y2="58" stroke="#5aa0ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Accent dot - top vertex glow -->
  <circle cx="64" cy="30" r="4" fill="#80d0ff" filter="url(#glow)"/>

  <!-- T letter subtle -->
  <text x="64" y="108" font-family="Arial" font-weight="bold" font-size="14"
        fill="#3a7bd5" text-anchor="middle" opacity="0.7">TRIVO</text>
</svg>
